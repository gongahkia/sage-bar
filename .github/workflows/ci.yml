name: Sage Bar CI/CD on push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [macos-14, macos-13]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-${{ matrix.os }}-homebrew-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.os }}-homebrew-
      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.swiftpm/cache
            ~/.swiftpm/configuration
          key: ${{ runner.os }}-${{ matrix.os }}-swiftpm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.os }}-swiftpm-
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint --strict
      - name: Install swift-format
        run: brew install swift-format
      - name: swift-format lint
        run: |
          OUTPUT=$(swift-format lint --recursive Sources/ Tests/ 2>&1)
          [ -z "$OUTPUT" ] || { echo "$OUTPUT"; exit 1; }
      - name: Fail on unchecked try? outside allowlist
        run: |
          MATCHES=$(rg "try\\?" Sources/ClaudeUsage -n || true)
          if [ -z "$MATCHES" ]; then
            exit 0
          fi
          FILTERED=$(echo "$MATCHES" | grep -Fv -f .ci/tryq_allowlist.txt || true)
          if [ -n "$FILTERED" ]; then
            echo "Unchecked try? usage outside allowlist:"
            echo "$FILTERED"
            exit 1
          fi
      - name: Validate prices.json
        run: python3 -c "import json,sys; json.load(open('Sources/ClaudeUsage/Resources/prices.json'))"
      - name: Build app target (release)
        run: swift build --target ClaudeUsage -c release -Xswiftc -warnings-as-errors
      - name: Gate Config/Polling compile diagnostics
        shell: bash
        run: |
          set -o pipefail
          LOG_FILE="$(mktemp)"
          swift build --target ClaudeUsage 2>&1 | tee "$LOG_FILE"
          if rg -n "Sources/ClaudeUsage/Config/Config.swift:.*(warning|error):|Sources/ClaudeUsage/Services/PollingService.swift:.*(warning|error):" "$LOG_FILE"; then
            echo "Compile diagnostics found in Config.swift or PollingService.swift."
            exit 1
          fi
      - name: Build CLI target (release)
        run: swift build --target ClaudeUsageCLI -c release -Xswiftc -warnings-as-errors
      - name: Build
        run: swift build
      - name: Test
        run: swift test --parallel
      - name: Test (Thread Sanitizer)
        run: swift test --sanitize=thread
