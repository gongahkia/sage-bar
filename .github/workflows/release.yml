name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Assert tag matches Info.plist version
        run: |
          TAG="${{ github.ref_name }}"
          PLIST_VERSION=$(plutil -extract CFBundleShortVersionString raw Sources/ClaudeUsage/Resources/Info.plist)
          [ "v${PLIST_VERSION}" = "${TAG}" ] || { echo "Tag ${TAG} does not match Info.plist CFBundleShortVersionString ${PLIST_VERSION}"; exit 1; }

      - name: Test
        run: swift test

      - name: Build x86_64
        run: swift build -c release --arch x86_64

      - name: Build arm64
        run: swift build -c release --arch arm64

      - name: Create universal binary (ClaudeUsage)
        run: |
          lipo -create \
            .build/x86_64-apple-macosx/release/ClaudeUsage \
            .build/arm64-apple-macosx/release/ClaudeUsage \
            -output ClaudeUsage-universal

      - name: Create universal binary (claude-usage CLI)
        run: |
          lipo -create \
            .build/x86_64-apple-macosx/release/claude-usage \
            .build/arm64-apple-macosx/release/claude-usage \
            -output claude-usage-universal

      - name: Export architecture-specific CLI binaries
        run: |
          cp .build/arm64-apple-macosx/release/claude-usage claude-usage-arm64
          cp .build/x86_64-apple-macosx/release/claude-usage claude-usage-x86_64
          chmod +x claude-usage-arm64 claude-usage-x86_64

      - name: Bundle .app
        run: |
          APP=ClaudeUsage.app
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp ClaudeUsage-universal "$APP/Contents/MacOS/ClaudeUsage"
          cp Sources/ClaudeUsage/Resources/Info.plist "$APP/Contents/"
          cp Sources/ClaudeUsage/Resources/prices.json "$APP/Contents/Resources/"
          cp Sources/ClaudeUsage/Scriptable/ClaudeUsage.sdef "$APP/Contents/Resources/"

      - name: Code sign app
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          xcrun codesign --force --deep --sign "$DEVELOPER_ID_APPLICATION" \
            --options runtime \
            --entitlements ClaudeUsage.entitlements \
            ClaudeUsage.app

      - name: Verify signed app
        run: |
          spctl --assess --type execute --verbose=4 ClaudeUsage.app

      - name: Create DMG
        run: |
          hdiutil create -volname ClaudeUsage -srcfolder ClaudeUsage.app \
            -ov -format UDZO ClaudeUsage-${{ github.ref_name }}.dmg

      - name: Code sign DMG
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          xcrun codesign --force --sign "$DEVELOPER_ID_APPLICATION" \
            ClaudeUsage-${{ github.ref_name }}.dmg

      - name: Verify signed DMG
        run: |
          spctl --assess --type open --verbose=4 ClaudeUsage-${{ github.ref_name }}.dmg

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit ClaudeUsage-${{ github.ref_name }}.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple ClaudeUsage-${{ github.ref_name }}.dmg

      - name: Generate Sparkle appcast
        run: |
          # download generate_appcast from Sparkle release
          curl -L https://github.com/sparkle-project/Sparkle/releases/latest/download/Sparkle-for-Swift-Package-Manager.zip \
            -o sparkle_tools.zip
          unzip -j sparkle_tools.zip '*/generate_appcast' -d sparkle_bin/
          chmod +x sparkle_bin/generate_appcast
          mkdir -p docs
          ./sparkle_bin/generate_appcast --link "https://github.com/${{ github.repository }}/releases" \
            --download-url-prefix "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/" \
            --output-path docs/appcast.xml \
            ClaudeUsage-${{ github.ref_name }}.dmg

      - name: Upload appcast to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Patch Homebrew SHA256 values
        run: |
          DMG_SHA=$(shasum -a 256 "ClaudeUsage-${{ github.ref_name }}.dmg" | awk '{print $1}')
          ARM_SHA=$(shasum -a 256 claude-usage-arm64 | awk '{print $1}')
          X86_SHA=$(shasum -a 256 claude-usage-x86_64 | awk '{print $1}')

          sed -i '' "s/PLACEHOLDER_SHA256/${DMG_SHA}/g" homebrew/Casks/claude-usage.rb
          sed -i '' "s/PLACEHOLDER_SHA256/${DMG_SHA}/g" homebrew/Formula/claude-usage-cli.rb
          sed -i '' "s/PLACEHOLDER_ARM64_SHA256/${ARM_SHA}/g" homebrew/Formula/claude-usage-cli.rb
          sed -i '' "s/PLACEHOLDER_X86_SHA256/${X86_SHA}/g" homebrew/Formula/claude-usage-cli.rb

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ClaudeUsage-${{ github.ref_name }}.dmg
            claude-usage-universal
            claude-usage-arm64
            claude-usage-x86_64
            homebrew/Casks/claude-usage.rb
            homebrew/Formula/claude-usage-cli.rb
