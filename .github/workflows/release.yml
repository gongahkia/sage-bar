name: Sage Bar Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Assert tag matches Info.plist version
        run: |
          TAG="${{ github.ref_name }}"
          PLIST_VERSION=$(plutil -extract CFBundleShortVersionString raw Sources/ClaudeUsage/Resources/Info.plist)
          [ "v${PLIST_VERSION}" = "${TAG}" ] || { echo "Tag ${TAG} does not match Info.plist CFBundleShortVersionString ${PLIST_VERSION}"; exit 1; }

      - name: Test
        run: swift test

      - name: Build arm64 app (release)
        run: swift build --product SageBar -c release --arch arm64

      - name: Build x86_64 app (release)
        run: swift build --product SageBar -c release --arch x86_64

      - name: Create universal app inputs
        shell: bash
        run: |
          set -euo pipefail

          ARM_DIR=".build/arm64-apple-macosx/release"
          X86_DIR=".build/x86_64-apple-macosx/release"
          DIST_DIR="dist"

          mkdir -p "$DIST_DIR"
          lipo -create "$ARM_DIR/SageBar" "$X86_DIR/SageBar" -output "$DIST_DIR/SageBar"

          cp -R "$ARM_DIR/SageBar_SageBar.bundle" "$DIST_DIR/SageBar_SageBar.bundle"
          cp -R "$ARM_DIR/Sparkle.framework" "$DIST_DIR/Sparkle.framework"

          merge_binary() {
            local arm_path="$1"
            local x86_path="$2"
            local output_path="$3"
            lipo -create "$arm_path" "$x86_path" -output "$output_path"
            chmod +x "$output_path"
          }

          merge_binary \
            "$ARM_DIR/Sparkle.framework/Versions/B/Sparkle" \
            "$X86_DIR/Sparkle.framework/Versions/B/Sparkle" \
            "$DIST_DIR/Sparkle.framework/Versions/B/Sparkle"

          merge_binary \
            "$ARM_DIR/Sparkle.framework/Versions/B/Autoupdate" \
            "$X86_DIR/Sparkle.framework/Versions/B/Autoupdate" \
            "$DIST_DIR/Sparkle.framework/Versions/B/Autoupdate"

          merge_binary \
            "$ARM_DIR/Sparkle.framework/Versions/B/Updater.app/Contents/MacOS/Updater" \
            "$X86_DIR/Sparkle.framework/Versions/B/Updater.app/Contents/MacOS/Updater" \
            "$DIST_DIR/Sparkle.framework/Versions/B/Updater.app/Contents/MacOS/Updater"

          merge_binary \
            "$ARM_DIR/Sparkle.framework/Versions/B/XPCServices/Downloader.xpc/Contents/MacOS/Downloader" \
            "$X86_DIR/Sparkle.framework/Versions/B/XPCServices/Downloader.xpc/Contents/MacOS/Downloader" \
            "$DIST_DIR/Sparkle.framework/Versions/B/XPCServices/Downloader.xpc/Contents/MacOS/Downloader"

          merge_binary \
            "$ARM_DIR/Sparkle.framework/Versions/B/XPCServices/Installer.xpc/Contents/MacOS/Installer" \
            "$X86_DIR/Sparkle.framework/Versions/B/XPCServices/Installer.xpc/Contents/MacOS/Installer" \
            "$DIST_DIR/Sparkle.framework/Versions/B/XPCServices/Installer.xpc/Contents/MacOS/Installer"

      - name: Bundle app
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          ./scripts/bundle_app.sh \
            --binary dist/SageBar \
            --resources-bundle dist/SageBar_SageBar.bundle \
            --sparkle-framework dist/Sparkle.framework \
            --output "Sage Bar.app" \
            --codesign-identity "$DEVELOPER_ID_APPLICATION" \
            --entitlements ClaudeUsage.entitlements

      - name: Verify signed app bundle
        run: ./scripts/verify_app_bundle.sh --app "Sage Bar.app" --smoke-launch --launch-wait 8

      - name: Create release zip
        run: ditto -c -k --sequesterRsrc --keepParent "Sage Bar.app" "Sage-Bar-${{ github.ref_name }}.zip"

      - name: Notarize release zip
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit "Sage-Bar-${{ github.ref_name }}.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

      - name: Create DMG
        run: |
          hdiutil create -volname "Sage Bar" -srcfolder "Sage Bar.app" \
            -ov -format UDZO "Sage-Bar-${{ github.ref_name }}.dmg"

      - name: Code sign DMG
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          xcrun codesign --force --sign "$DEVELOPER_ID_APPLICATION" \
            "Sage-Bar-${{ github.ref_name }}.dmg"

      - name: Verify signed DMG
        run: |
          spctl --assess --type open --verbose=4 "Sage-Bar-${{ github.ref_name }}.dmg"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit "Sage-Bar-${{ github.ref_name }}.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple "Sage-Bar-${{ github.ref_name }}.dmg"

      - name: Generate Sparkle appcast
        run: |
          curl -L https://github.com/sparkle-project/Sparkle/releases/latest/download/Sparkle-for-Swift-Package-Manager.zip \
            -o sparkle_tools.zip
          unzip -j sparkle_tools.zip '*/generate_appcast' -d sparkle_bin/
          chmod +x sparkle_bin/generate_appcast
          mkdir -p docs
          ./sparkle_bin/generate_appcast --link "https://github.com/${{ github.repository }}/releases" \
            --download-url-prefix "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/" \
            --output-path docs/appcast.xml \
            "Sage-Bar-${{ github.ref_name }}.dmg"

      - name: Upload appcast to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Sage-Bar-${{ github.ref_name }}.zip
            Sage-Bar-${{ github.ref_name }}.dmg

  deploy-pages:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
